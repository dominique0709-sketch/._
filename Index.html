<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: "Georgia", serif;
    background:#f8f5f2;
    color:#4a4a4a;
    text-align:center;
}

/* SECCIONES SUPER SEPARADAS */
.section{
    min-height:100vh;
    padding:160px 30px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* CORAZÓN */
.heart-wrapper{
    cursor:pointer;
}

.heart{
    width:170px;
    height:170px;
    background:#e8dcd2;
    position:relative;
    transform:rotate(-45deg);
    animation:latido 1.2s infinite;
}

.heart:before,
.heart:after{
    content:"";
    width:170px;
    height:170px;
    background:#e8dcd2;
    border-radius:50%;
    position:absolute;
}

.heart:before{
    top:-85px;
    left:0;
}

.heart:after{
    left:85px;
    top:0;
}

@keyframes latido{
    0%{transform:rotate(-45deg) scale(1);}
    50%{transform:rotate(-45deg) scale(1.12);}
    100%{transform:rotate(-45deg) scale(1);}
}

.pulsa{
    margin-top:60px;
    font-size:38px;
    letter-spacing:6px;
    color:#7a5c4d;
}

/* CARTA */
.card{
    background:white;
    padding:100px 60px;
    border-radius:40px;
    box-shadow:0 30px 70px rgba(0,0,0,0.08);
    max-width:600px;
}

.button{
    margin-top:60px;
    padding:18px 60px;
    border:none;
    background:#7a5c4d;
    color:white;
    font-size:18px;
    border-radius:40px;
}

/* HERO FLORES */
.hero{
    background:url('https://images.pexels.com/photos/931162/pexels-photo-931162.jpeg?auto=compress&cs=tinysrgb&w=1600') center/cover no-repeat;
    position:relative;
    color:white;
}

.hero::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.35);
    top:0;
    left:0;
}

.hero-content{
    position:relative;
    z-index:2;
}

.hero h1{
    font-size:60px;
    margin-bottom:60px;
}

.countdown{
    font-size:42px;
    letter-spacing:4px;
}

/* BLOQUES */
.block{
    background:white;
    max-width:900px;
    margin:140px auto;
    padding:120px 60px;
    border-radius:40px;
    box-shadow:0 25px 60px rgba(0,0,0,0.06);
}

.block h2{
    font-size:38px;
    margin-bottom:60px;
    color:#7a5c4d;
}

.block p{
    font-size:20px;
    line-height:1.8;
}

input, textarea{
    width:80%;
    padding:20px;
    margin-top:40px;
    border-radius:15px;
    border:1px solid #ddd;
    font-size:16px;
}

.option{
    margin-top:40px;
    padding:20px 50px;
    border:none;
    border-radius:40px;
    background:#7a5c4d;
    color:white;
    font-size:18px;
}
</style>
</head>

<body>

<!-- CORAZÓN -->
<div class="section" id="inicio">
    <div class="heart-wrapper" onclick="mostrarCarta()">
        <div class="heart"></div>
        <div class="pulsa">PULSA</div>
    </div>
</div>

<!-- CARTA -->
<div class="section" id="carta" style="display:none;">
    <div class="card">
        <h2>Esta invitación es para ti</h2>
        <h1 contenteditable="true" style="margin-top:60px; font-size:48px;">[Nombre]</h1>
        <button class="button" onclick="abrirInvitacion()">Abrir</button>
    </div>
</div>

<!-- HERO -->
<div class="section hero" id="hero" style="display:none;">
    <div class="hero-content">
        <h1>Boda de Johanna & Paolo</h1>
        <div class="countdown" id="dias">XXX días</div>
    </div>
</div>

<!-- CEREMONIA -->
<div class="block">
    <h2>Ceremonia</h2>
    <p contenteditable="true">Sábado XX de Noviembre</p>
    <p contenteditable="true" style="margin-top:40px;">Lugar del evento</p>
</div>

<!-- GALERÍA -->
<div class="block">
    <h2>Nuestro Amor</h2>
    <img src="https://via.placeholder.com/400" style="width:60%; border-radius:25px; margin-top:40px;">
</div>

<!-- MÚSICA -->
<div class="block">
    <h2>Música</h2>
    <p>¿Qué canción no puede faltar?</p>
    <input type="text" placeholder="Escribe aquí">
</div>

<!-- REGALOS -->
<div class="block">
    <h2>Regalos</h2>
    <p contenteditable="true">Datos bancarios aquí</p>
</div>

<!-- CONFIRMACIÓN -->
<div class="block">
    <h2>Confirmación</h2>
    <button class="option">Sí asistiré</button>
    <button class="option" style="background:#b46e6e;">No podré asistir</button>
</div>

<script>
function mostrarCarta(){
    document.getElementById("inicio").style.display="none";
    document.getElementById("carta").style.display="flex";
}

function abrirInvitacion(){
    document.getElementById("carta").style.display="none";
    document.getElementById("hero").style.display="flex";
}
</script>

</body>
  </html>
